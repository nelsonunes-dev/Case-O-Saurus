version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest  # ARM/AMD compatible
    container_name: caseosaurus-sql
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/CaseOSaurus.API/Dockerfile
    container_name: caseosaurus-api
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CaseOSaurus;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    ports:
      - "5000:80"
    depends_on:
      - sqlserver

volumes:
  sql-data: